<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quanto amo Mariangela?</title>
  <style>
    :root {
      --bg1: #fff4f6;
      --bg2: #fde2e8;
      --text: #2b1b22;
      --muted: #6d4c5a;
      --accent: #d6336c;
      --accent-dark: #a61e4d;
      --card: rgba(255, 255, 255, 0.82);
      --shadow: 0 24px 60px rgba(166, 30, 77, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffffff 0, transparent 32%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 680px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 32px;
      padding: 34px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(214, 51, 108, 0.10);
      color: var(--accent-dark);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 58px);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 18px auto 30px;
      color: var(--muted);
      font-size: clamp(17px, 3.5vw, 20px);
      line-height: 1.45;
      max-width: 540px;
    }

    .slider-wrap {
      margin: 26px 0 18px;
      padding: 24px;
      border-radius: 24px;
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(214, 51, 108, 0.12);
    }

    .value {
      font-size: 44px;
      font-weight: 800;
      color: var(--accent-dark);
      letter-spacing: -0.04em;
      margin-bottom: 12px;
      min-height: 56px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .scale {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 26px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 15px 24px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 12px 28px rgba(214, 51, 108, 0.30);
    }

    .secondary {
      background: white;
      color: var(--accent-dark);
      border: 1px solid rgba(214, 51, 108, 0.20);
    }

    .result {
      margin-top: 26px;
      padding: 22px;
      border-radius: 24px;
      display: none;
      animation: pop 0.28s ease both;
    }

    .result.wrong {
      display: block;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(166, 30, 77, 0.14);
    }

    .result.correct {
      display: block;
      background: linear-gradient(135deg, rgba(255,255,255,0.88), rgba(255, 240, 246, 0.92));
      border: 1px solid rgba(214, 51, 108, 0.26);
    }

    .result h2 {
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: -0.03em;
    }

    .result p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.45;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      bottom: -40px;
      font-size: 22px;
      animation: floatUp 2.8s linear forwards;
    }

    @keyframes pop {
      from { transform: scale(0.97); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) scale(0.9) rotate(0deg);
        opacity: 0;
      }
      15% { opacity: 1; }
      to {
        transform: translateY(-110vh) scale(1.4) rotate(18deg);
        opacity: 0;
      }
    }

    @media (max-width: 520px) {
      .card {
        padding: 26px 20px;
        border-radius: 26px;
      }

      .slider-wrap {
        padding: 20px 16px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <main class="page">
    <section class="card">
      <div class="eyebrow">❤️ Test ufficiale</div>

      <h1>Quanto amo Mariangela?</h1>

      <p class="subtitle">
        Sposta la barra sul livello che, secondo te, rappresenta quanto Francesco ama Mariangela.
        Poi premi submit.
      </p>

      <div class="slider-wrap">
        <div class="value" id="displayValue">1</div>
        <input id="loveRange" type="range" min="1" max="101" value="1" />
        <div class="scale">
          <span>1</span>
          <span>molto</span>
          <span>∞</span>
        </div>
      </div>

      <div class="actions">
        <button class="primary" onclick="checkAnswer()">Submit</button>
        <button class="secondary" onclick="resetGame()">Riprova</button>
      </div>

      <div id="result" class="result"></div>
    </section>
  </main>

  <script>
    const range = document.getElementById("loveRange");
    const displayValue = document.getElementById("displayValue");
    const result = document.getElementById("result");
    const hearts = document.getElementById("hearts");

    function renderValue() {
      const value = Number(range.value);
      displayValue.textContent = value === 101 ? "∞" : value;
    }

    range.addEventListener("input", renderValue);

    function checkAnswer() {
      const value = Number(range.value);

      if (value === 101) {
        result.className = "result correct";
        result.innerHTML = `
          <h2>Esatto. Risposta corretta.</h2>
          <p>Francesco ama Mariangela all’infinito. Congratulazioni, hai compreso la misura corretta.</p>
        `;
        launchHearts();
      } else {
        result.className = "result wrong";
        result.innerHTML = `
          <h2>Non ancora.</h2>
          <p>${value} è troppo poco. La risposta giusta non è un numero: è infinito. Riprova.</p>
        `;
      }
    }

    function resetGame() {
      range.value = 1;
      renderValue();
      result.className = "result";
      result.innerHTML = "";
    }

    function launchHearts() {
      for (let i = 0; i < 28; i++) {
        setTimeout(() => {
          const heart = document.createElement("div");
          heart.className = "heart";
          heart.textContent = ["❤️", "💘", "💕", "💗"][Math.floor(Math.random() * 4)];
          heart.style.left = Math.random() * 100 + "vw";
          heart.style.animationDuration = (2 + Math.random() * 1.8) + "s";
          heart.style.fontSize = (18 + Math.random() * 22) + "px";
          hearts.appendChild(heart);

          setTimeout(() => heart.remove(), 4200);
        }, i * 55);
      }
    }

    renderValue();
  </script>
</body>
</html>
